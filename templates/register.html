{% extends "base.html" %}
{% block content %}
<h2>Criar usuário</h2>
<form action="/register" method="post">
  <label>E-mail<input name="email" type="email" required></label>
  <label>Senha<input name="password" type="password" required minlength="8"></label>
  <button type="submit">Criar conta</button>
</form>
{% endblock %}
